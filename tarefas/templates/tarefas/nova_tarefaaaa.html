<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Tarefa - Sistema de Gestão</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form { max-width: 500px; margin: auto; }
    div { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, textarea, select { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <form method="post" enctype="multipart/form-data">
    <h2>Cadastrar Nova Tarefa</h2>
    {% csrf_token %}

    <div>
      <label for="{{ form.titulo.id_for_label }}">Título da Tarefa:</label>
      {{ form.titulo }}
    </div>

    <div>
      <label for="{{ form.descricao.id_for_label }}">Descrição:</label>
      {{ form.descricao }}
    </div>

    <div>
      <label for="{{ form.projeto.id_for_label }}">Vincular ao Projeto:</label>
      {{ form.projeto }}
    </div>

    <div style="margin-top:6px;">
      <a href="{% url 'novo_projeto' %}?next={% url 'novo_servico' %}">+ Novo projeto</a>
    </div>

    <div>
      <label for="{{ form.responsavel.id_for_label }}">Atribuir a:</label>
      {{ form.responsavel }}
        </div>

    <div style="margin-top:6px;">
      <a href="{% url 'novo_responsavel' %}?next={% url 'novo_servico' %}">+ Nova atribuição</a>
    </div>

    <div>
        <label for="{{ form.cliente.id_for_label }}">Cliente:</label>
        {{ form.cliente }}

      <div style="margin-top:6px;">
        <a href="{% url 'novo_cliente' %}?next={% url 'novo_servico' %}">+ Novo cliente</a>
      </div>
    </div>

    <div>
      <label for="{{ form.prazo.id_for_label }}">Prazo de Entrega:</label>
      {{ form.prazo }}
    </div>

    <div>
      <label for="{{ form.foto.id_for_label }}">Adicionar Foto:</label>
      {{ form.foto }}
    </div>

    <button type="submit">Salvar Tarefa</button>
  </form>

</body>
</html>
