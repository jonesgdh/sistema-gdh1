<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Responsável</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    form { max-width: 500px; margin: auto; }
    div { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    .erro { color: #c00; font-size: 14px; }
  </style>
</head>
<body>

  <form method="post">
    <h2>Cadastrar Nova Atribuição (Responsável)</h2>
    {% csrf_token %}

    <div>
      <label for="{{ form.nome.id_for_label }}">Nome:</label>
      {{ form.nome }}
      {% for e in form.nome.errors %}<div class="erro">{{ e }}</div>{% endfor %}
    </div>

    <div>
      <label for="{{ form.username.id_for_label }}">Username (único):</label>
      {{ form.username }}
      {% for e in form.username.errors %}<div class="erro">{{ e }}</div>{% endfor %}
    </div>

    <button type="submit">Salvar Responsável</button>

    <div style="margin-top:12px;">
      <a href="{{ next_url }}">Voltar</a>
    </div>
  </form>

</body>
</html>
