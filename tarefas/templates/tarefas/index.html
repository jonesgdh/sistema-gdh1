<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestão</title>
  <style>
    body { font-family: sans-serif; padding: 30px; }
    .box { max-width: 520px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
    h2 { margin-top: 0; }
    a.btn {
      display:block; text-decoration:none; text-align:center;
      padding: 12px; margin: 12px 0; border-radius: 8px;
      background: #007bff; color: #fff;
    }
    a.btn.secondary { background: #343a40; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📌 Sistema de Gestão</h2>
    <p>Escolha uma opção:</p>

    <a class="btn" href="{% url 'nova_tarefa' %}">➕ Criar nova tarefa</a>
    <a class="btn secondary" href="{% url 'pesquisar_tarefas' %}">🔎 Pesquisar tarefas</a>
  </div>
</body>
</html>
