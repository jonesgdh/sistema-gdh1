{% extends "base.html" %}

{% block title %}Novo Serviço{% endblock %}

{% block content %}
<div class="card card-soft p-4">
    <h1 class="mb-4">Novo Serviço</h1>

    <form method="post">
        {% csrf_token %}
        {{ servico_form.as_p }}

        <button type="submit" class="btn btn-primary">Salvar Serviço</button>
        <a href="{% url 'listar_servicos' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
