<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, #0b2a6f, #0d6efd);
      padding: 24px;
    }
    .card-soft { border:0; border-radius:18px; box-shadow: 0 18px 55px rgba(0,0,0,.25); }
  </style>
</head>
<body>
  <div class="card card-soft" style="max-width: 420px; width: 100%;">
    <div class="card-body p-4 p-md-5">
      <div class="mb-3">
        <h3 class="mb-1 fw-semibold">Sistema RD Marques</h3>
        <div class="text-muted">Acesso restrito</div>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger py-2">Usuário ou senha inválidos.</div>
      {% endif %}

      <form method="post" class="mt-3">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label" for="id_username">Usuário</label>
          <input type="text" name="username" class="form-control form-control-lg" required id="id_username" autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label" for="id_password">Senha</label>
          <input type="password" name="password" class="form-control form-control-lg" required id="id_password">
        </div>

        <button class="btn btn-primary btn-lg w-100" type="submit">Entrar</button>
      </form>

      <div class="text-center text-muted mt-3" style="font-size: 12px;">
        Projeto UNIVESP • Django
      </div>
    </div>
  </div>
</body>
</html>
